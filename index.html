<!DOCTYPE html>
<html>
<head>
  <title>Anime Recommendation Wheel</title>
  <!-- Winwheel.js -->
  <script src="https://cdn.jsdelivr.net/npm/winwheel@2.8.0/Winwheel.min.js"></script>
  <!-- Firebase v9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; text-align:center; padding:20px; }
    h1 { color:#333; margin-bottom:10px; }
    #wheelContainer { display:inline-block; position:relative; }
    #wheelCanvas { border:10px solid #4a90e2; border-radius:50%; box-shadow:0 0 30px rgba(0,0,0,0.3); }
    #spin { margin-top:20px; padding:15px 40px; font-size:20px; background: linear-gradient(45deg, #4a90e2, #50e3c2); color:white; border:none; border-radius:10px; cursor:pointer; box-shadow:0 5px 15px rgba(0,0,0,0.2); transition: transform 0.1s; }
    #spin:active { transform: scale(0.95); }
    #list { margin-top:20px; font-size:18px; color:#555; }
    input, button.addBtn { padding:10px; font-size:16px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
    button.addBtn { background: linear-gradient(45deg,#50e3c2,#4a90e2); color:white; cursor:pointer; }
    #winnerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; }
    #winnerModalContent { background:white; width:300px; padding:30px; margin:150px auto; border-radius:15px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
    #winnerModalContent h2 { color:#4a90e2; margin-bottom:15px; }
    #winnerModalContent p { font-size:24px; font-weight:bold; color:#333; }
    #closeWinner { margin-top:20px; padding:10px 30px; background: linear-gradient(45deg,#50e3c2,#4a90e2); color:white; border:none; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>

<h1>Anime Recommendation Wheel</h1>

<div id="wheelContainer">
  <canvas id="wheelCanvas" width="500" height="500"></canvas>
</div>
<br>
<button id="spin">SPIN</button>

<div>
  <input type="text" id="nameInput" placeholder="Enter Anime">
  <button class="addBtn" id="addEntry">Add Anime</button>
</div>

<ul id="list"></ul>

<!-- Winner Modal -->
<div id="winnerModal">
  <div id="winnerModalContent">
    <h2>Winner!</h2>
    <p id="winnerText"></p>
    <button id="closeWinner">Close</button>
  </div>
</div>

<script>
window.onload = function() {
  // Initialize Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDnXYM7h0fJUUVT7nlLJudk4i9wCEJTx6M",
    authDomain: "anime-list-f7483.firebaseapp.com",
    databaseURL: "https://anime-list-f7483-default-rtdb.firebaseio.com",
    projectId: "anime-list-f7483",
    storageBucket: "anime-list-f7483.firebasestorage.app",
    messagingSenderId: "990842266634",
    appId: "1:990842266634:web:95f5c7559868fda0e0abf3",
    measurementId: "G-SWL650B800"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const isHost = urlParams.get("host") === "true";

  let wheel;
  let entries = [];

  // Safe wheel creation helper
  function createWheelSafely() {
    if (typeof Winwheel === 'undefined') {
      setTimeout(createWheelSafely, 50); // retry until Winwheel exists
      return;
    }
    if(entries.length > 0){
      const segmentColors = entries.map(() => `hsl(${Math.random()*360},70%,60%)`);
      wheel = new Winwheel({
        canvasId: 'wheelCanvas',
        numSegments: entries.length,
        segments: entries.map((e,i)=>({ text:e.name, fillStyle: segmentColors[i] })),
        animation: { type:'spinToStop', duration:5, spins:8, callbackFinished:onSpinFinished }
      });
    }
  }

  // Firebase listener
  db.ref("entries").on("value", snapshot => {
    entries = [];
    snapshot.forEach(child => entries.push({ key: child.key, name: child.val() }));
    document.getElementById("list").innerHTML = entries.map(e=>`<li>${e.name}</li>`).join("");
    createWheelSafely();
  });

  // Add Anime
  document.getElementById("addEntry").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if(!name) return;
    if(entries.some(e=>e.name.toLowerCase()===name.toLowerCase())){
      alert("Anime already added!");
      return;
    }
    db.ref("entries").push(name);
    document.getElementById("nameInput").value="";
  };

  // Spin button
  document.getElementById("spin").onclick = () => {
    if(!isHost || !wheel || entries.length===0) return;
    wheel.startAnimation();
  };

  // Spin finished
  function onSpinFinished(segment){
    const winner = segment.text;
    if(isHost){
      document.getElementById("winnerText").innerText = winner;
      document.getElementById("winnerModal").style.display="block";
    }
    const winnerEntry = entries.find(e=>e.name===winner);
    if(winnerEntry) db.ref("entries/"+winnerEntry.key).remove();
  }

  // Winner modal close
  const closeBtn = document.getElementById("closeWinner");
  if(!isHost) closeBtn.style.display="none";
  closeBtn.onclick = ()=>{ document.getElementById("winnerModal").style.display="none"; };
};
</script>

</body>
</html>
